query GetClubs {
  clubs {
    items {
      id
      name
      sport
      description
      status
      createdAt
      membersCount
      captainName
      fundBalance
    }
  }
}

query GetClubMembers($id: String!) {
  club(id: $id) {
    id
    name
    members {
      id
      clubId
      userId
      displayName
      email
      phone
      status
      createdAt
      user {
        id
        name
        email
      }
    }
  }
}

query GetMemberCandidateUsers {
  candidateUsers {
    id
    name
    email
    isActive
  }
}

mutation CreateClub($input: ClubUncheckedCreateInput!) {
  createClub(input: $input) {
    id
    name
    sport
    description
    status
    createdAt
    membersCount
    captainName
    fundBalance
  }
}

mutation UpdateClub($id: String!, $input: ClubUncheckedUpdateInput!) {
  updateClub(id: $id, input: $input) {
    id
    name
    sport
    description
    status
    createdAt
    membersCount
    captainName
    fundBalance
  }
}

mutation DeleteClub($id: String!) {
  deleteClub(id: $id)
}

mutation AddClubMember($input: AddClubMemberInput!) {
  addClubMember(input: $input) {
    id
    clubId
    userId
    displayName
    email
    phone
    status
    createdAt
  }
}

mutation RemoveClubMember($memberId: String!) {
  removeClubMember(memberId: $memberId)
}
